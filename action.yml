name: quail-review
description: Generate tests for a PR and heal Playwright locators on failure (OSS edition).
author: spriteCloud
branding:
  icon: target
  color: blue
inputs:
  pr:
    description: PR number. Defaults to the event payload.
    required: false
  github-token:
    description: Token used to open the follow-up PR. Defaults to the workflow's GITHUB_TOKEN.
    required: false
    default: ''
  openai-base-url:
    description: OpenAI-compatible base URL (ollama, vLLM, DGX-hosted vLLM, etc.).
    required: false
    default: https://api.openai.com/v1
  openai-api-key:
    description: API key for the inference endpoint. Leave empty to skip LLM humanization entirely.
    required: false
    default: ""
  model:
    description: Model name for the chat-completions request.
    required: false
    default: gpt-4o-mini
  heal-mode:
    description: on-failure | proactive | off
    required: false
    default: on-failure
  playwright-report:
    description: Path to playwright JSON report; required when heal-mode=on-failure.
    required: false
    default: playwright-report.json
  run-generate:
    description: Whether to run `quail generate`. Set to "false" to only heal.
    required: false
    default: "true"
  run-heal:
    description: Whether to run `quail heal`. Set to "false" to only generate.
    required: false
    default: "true"
  target-urls:
    description: |
      Comma-separated list of live URLs quail should probe and generate a
      Playwright happy-flow against. Useful for projects with little or no
      source in the PR diff (the URL is the source of truth instead).
      Pages are fetched over plain HTTP(S) — JavaScript-rendered SPAs that
      depend on client-side hydration will surface as empty.
    required: false
    default: ""
  kinds:
    description: |
      Comma-separated allow-list of test kinds to emit (e.g. "a11y,perf").
      Empty = all kinds. See README for the full vocabulary.
    required: false
    default: ""
  exclude-kinds:
    description: Comma-separated deny-list of test kinds, applied after `kinds`.
    required: false
    default: ""
  dom-snapshots:
    description: "true to commit raw tests/e2e/_dom/*.html browser-render dumps. Default false."
    required: false
    default: "false"
  a11y-uncap:
    description: "true to emit the a11y trio on every crawled page (default caps at the per-page fuzz cap)."
    required: false
    default: "false"
  humanize-budget:
    description: |
      Override QUAIL_HUMANIZE_BUDGET (Go duration, e.g. "10m"). Empty =
      binary default (5m). Bump when probes against larger sites hit the
      budget cap before humanizing every file.
    required: false
    default: ""
  llm-timeout:
    description: |
      Override QUAIL_LLM_TIMEOUT (Go duration, e.g. "120s"). Empty = binary
      default (60s). Bump when the self-hosted endpoint is slower than
      typical OpenAI latencies (composer calls otherwise hit
      Client.Timeout exceeded and the journey is skipped).
    required: false
    default: ""
  keep-workflows:
    description: |
      'true' to ship .github/workflows/* files (e.g. the bot-emitted
      tests/e2e CI workflow) in the bot PR. Default is 'false' because
      the default GITHUB_TOKEN lacks the `workflow` scope and the remote
      rejects the push. Set to 'true' AND pass a `github-token` carrying
      the `workflow` scope (a fine-grained PAT or GitHub App) so the
      emitted e2e.yml lands in the PR and triggers Playwright on open.
    required: false
    default: "false"
  quail-llm:
    description: |
      OpenAI-compatible endpoint used by the LLM composer (adds up to 5
      `@llm-composed` Scenarios per journey). Distinct from
      `openai-base-url`, which only enables humanization. Leave empty to
      keep generation deterministic. Strictly internal / self-hosted —
      do not point at a third-party endpoint with private repo content.
    required: false
    default: ""
  browsers:
    description: |
      Comma-list of Playwright engines the bot PR should default to
      (e.g. `chromium`, `firefox`, `chromium,firefox`). Baked into the
      generated `playwright.config.ts` and the CI workflow as the
      default; runtime override via `QUAIL_BROWSERS` env still wins.
      Use `firefox` for Akamai-class WAFs (ING, banks) that drop
      chromium at the TLS layer before any JS-level stealth runs.
      First entry of the list also drives the probe-side QUAIL_ENGINE.
    required: false
    default: chromium
  log-level:
    description: debug | info | warn | error
    required: false
    default: info
  mode:
    description: |
      Which quail flow to run:
        - auto (default): current behaviour — generate + heal
        - generate: only run `quail generate`
        - heal: only run `quail heal`
        - review: run `quail review` (@quail PR reviewer, posts a
          markdown verdict comment) — pair with a workflow whose
          trigger is `issue_comment` filtered on `@quail`.
    required: false
    default: auto
  version:
    description: quail-review release tag to install. Defaults to "latest".
    required: false
    default: latest
  explore-url:
    description: |
      URL to probe with `quail explore`. When set, the explore step runs
      after any probe / generate / heal steps. Leave empty to skip.
      Runs ephemeral + change-aware by default — generated specs live
      only for the duration of the run; the Gherkin-formatted report is
      printed to the step's stdout.
    required: false
    default: ""
  explore-focus:
    description: |
      Comma-separated attack categories for `quail explore`.
      'all' (default) runs every category:
        boundary, injection, state-corrupt, race, auth, data-edge,
        cross-feature, flow-interrupt, sequence, role-switch,
        upstream-dep, cumulative
    required: false
    default: "all"
  explore-depth:
    description: |
      Probe depth for `quail explore`:
        shallow   — 30 probes per page  (fast CI gate)
        standard  — 60 probes per page  (default)
        deep      — 120 probes per page (nightly / pre-release)
    required: false
    default: "standard"
  explore-llm:
    description: |
      OpenAI-compatible endpoint for AI-assisted target selection and
      scenario composition in `quail explore`. Leave empty for
      deterministic-only mode (no LLM calls, still finds bugs).
      Must be a self-hosted / private endpoint — do not point at a
      third-party endpoint with sensitive site content.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Install quail-review
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token != '' && inputs.github-token || github.token }}
      run: |
        set -euo pipefail
        ver='${{ inputs.version }}'
        # Idempotent — skip reinstall when the binary is already on
        # PATH and we're not rebuilding from source. Lets callers invoke
        # this composite action more than once per workflow (e.g. once
        # for generate/heal, once for a standalone render step) without
        # paying the ~10s install cost each time.
        if [ "$ver" != "source" ] && command -v quail >/dev/null 2>&1; then
          echo "quail-review: already installed ($(quail --version 2>&1 | head -1)); skipping install."
          exit 0
        fi
        # 'source' → build from this action's checked-out sources. Requires
        # a prior `actions/setup-go@v5` in the caller workflow.
        # ponytail: no versioning ceremony for unreleased features; delete
        # this branch once every feature this action exposes ships in a tag.
        if [ "$ver" = "source" ]; then
          if ! command -v go >/dev/null 2>&1; then
            echo "quail-review: version=source needs setup-go in the workflow" >&2
            exit 1
          fi
          # ponytail: temporary GOWORK-based fetch of a private quail-core
          # ref, needed only while the Explorer contract lives on a branch.
          # Delete this block once quail-core cuts a release containing the
          # ExploreConfig types and quail-review's go.mod pins that tag.
          core_ref="${QUAIL_CORE_REF:-feat/explore}"
          workroot=$(mktemp -d)
          echo "quail-review: fetching quail-core@$core_ref for source build"
          git clone --depth 1 --branch "$core_ref" \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/spriteCloud/quail-core.git" \
            "$workroot/quail-core"
          printf 'go 1.25.10\nuse (\n  %s\n  %s\n)\n' \
            "${{ github.action_path }}" "$workroot/quail-core" \
            > "$workroot/go.work"
          export GOWORK="$workroot/go.work"
          ( cd "${{ github.action_path }}" && go build -o /tmp/quail ./cmd/quail )
          sudo install -m 0755 /tmp/quail /usr/local/bin/quail-review
          sudo ln -sf /usr/local/bin/quail-review /usr/local/bin/quail
          quail-review --version
          exit 0
        fi
        os=$(uname -s | tr '[:upper:]' '[:lower:]')
        arch=$(uname -m)
        case "$arch" in
          x86_64) arch=amd64 ;;
          aarch64|arm64) arch=arm64 ;;
        esac
        if [ "$ver" = "latest" ]; then
          ver=$(curl -fsSL https://api.github.com/repos/spriteCloud/quail-review/releases/latest | grep tag_name | cut -d'"' -f4)
        fi
        base="https://github.com/spriteCloud/quail-review/releases/download/${ver}"
        archive="quail-review_${os}_${arch}.tar.gz"
        tmp=$(mktemp -d)
        curl -fsSL "$base/$archive" -o "$tmp/$archive"
        if curl -fsSL "$base/checksums.txt" -o "$tmp/checksums.txt"; then
          (cd "$tmp" && sha256sum -c --ignore-missing checksums.txt) || {
            echo "quail-review: checksum verification failed" >&2
            exit 1
          }
        else
          echo "quail-review: checksums.txt unavailable; proceeding without verification" >&2
        fi
        tar -xzf "$tmp/$archive" -C "$tmp"
        sudo install -m 0755 "$tmp/quail-review" /usr/local/bin/quail-review
        # v1.0.0 — also install under the legacy `quail` name so
        # existing per-step `run: quail ...` blocks keep working.
        sudo ln -sf /usr/local/bin/quail-review /usr/local/bin/quail
        quail-review --version
    - name: Close stale quail bot PRs
      # Runs once per action invocation, right after install. Closes any
      # prior `quail/tests-pr-<N>-*` and `quail/heal-pr-<N>-*` bot PRs
      # against this PR whose branch SHA is stale, so retriggers don't
      # accumulate — customers converge on exactly one live tests-pr and
      # one live heal-pr per PR without writing any workflow logic.
      # No-op when `pr` isn't set (probe-standalone / explore-only flows).
      if: inputs.pr != ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token != '' && inputs.github-token || github.token }}
        PR: ${{ inputs.pr }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: |
        set -euo pipefail
        if [ -z "$HEAD_SHA" ] || [ -z "$PR" ]; then
          echo "quail-review: no head SHA / PR — skipping stale-PR cleanup."
          exit 0
        fi
        CURRENT="${HEAD_SHA:0:7}"
        for kind in tests-pr heal-pr; do
          gh pr list --state open --search "head:quail/${kind}-${PR}-" \
            --json number,headRefName --jq '.[] | "\(.number) \(.headRefName)"' \
          | while read n branch; do
              case "$branch" in
                *"-${CURRENT}") ;;  # keep the current-SHA one
                *)
                  echo "quail-review: closing stale bot PR #${n} (${branch})"
                  gh pr close "$n" --delete-branch \
                    --comment "Superseded by a fresh push to PR #${PR}." \
                    || echo "  ↳ close failed (may already be closed)"
                  ;;
              esac
            done
        done
    - name: quail generate
      # Diff-driven generation needs a PR. Skip when there's none but a probe
      # target is set — the standalone probe step below covers that case.
      if: (inputs.mode == 'auto' || inputs.mode == 'generate') && inputs.run-generate == 'true' && inputs.pr != ''
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token != '' && inputs.github-token || github.token }}
        OPENAI_BASE_URL: ${{ inputs.openai-base-url }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        QUAIL_MODEL: ${{ inputs.model }}
        QUAIL_PR: ${{ inputs.pr }}
        QUAIL_LOG_LEVEL: ${{ inputs.log-level }}
        QUAIL_TARGET_URLS: ${{ inputs.target-urls }}
        QUAIL_KINDS: ${{ inputs.kinds }}
        QUAIL_EXCLUDE_KINDS: ${{ inputs.exclude-kinds }}
        QUAIL_DOM_SNAPSHOTS: ${{ inputs.dom-snapshots == 'true' && '1' || '' }}
        QUAIL_A11Y_UNCAP: ${{ inputs.a11y-uncap == 'true' && '1' || '' }}
        QUAIL_LLM: ${{ inputs.quail-llm }}
        QUAIL_HUMANIZE_BUDGET: ${{ inputs.humanize-budget }}
        QUAIL_LLM_TIMEOUT: ${{ inputs.llm-timeout }}
        QUAIL_KEEP_WORKFLOWS: ${{ inputs.keep-workflows == 'true' && '1' || '' }}
        QUAIL_BROWSERS: ${{ inputs.browsers }}
      run: |
        # `browsers` is a comma-list (pw_config supports multi-engine
        # projects). The probe runner only drives one engine at a
        # time, so QUAIL_ENGINE = first entry of the list.
        export QUAIL_ENGINE="${QUAIL_BROWSERS%%,*}"
        quail generate
    - name: quail probe (standalone, no PR)
      # Fires when target-urls is set AND no PR is available (workflow_dispatch
      # or push runs). The PR-attached probe path already runs inside `generate`.
      if: (inputs.mode == 'auto' || inputs.mode == 'generate') && inputs.target-urls != '' && inputs.pr == ''
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token != '' && inputs.github-token || github.token }}
        OPENAI_BASE_URL: ${{ inputs.openai-base-url }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        QUAIL_MODEL: ${{ inputs.model }}
        QUAIL_LOG_LEVEL: ${{ inputs.log-level }}
        QUAIL_TARGET_URLS: ${{ inputs.target-urls }}
        QUAIL_KINDS: ${{ inputs.kinds }}
        QUAIL_EXCLUDE_KINDS: ${{ inputs.exclude-kinds }}
        QUAIL_DOM_SNAPSHOTS: ${{ inputs.dom-snapshots == 'true' && '1' || '' }}
        QUAIL_A11Y_UNCAP: ${{ inputs.a11y-uncap == 'true' && '1' || '' }}
        QUAIL_LLM: ${{ inputs.quail-llm }}
        QUAIL_HUMANIZE_BUDGET: ${{ inputs.humanize-budget }}
        QUAIL_LLM_TIMEOUT: ${{ inputs.llm-timeout }}
        QUAIL_KEEP_WORKFLOWS: ${{ inputs.keep-workflows == 'true' && '1' || '' }}
        QUAIL_BROWSERS: ${{ inputs.browsers }}
      run: |
        export QUAIL_ENGINE="${QUAIL_BROWSERS%%,*}"
        quail probe
    - name: quail heal
      if: (inputs.mode == 'auto' || inputs.mode == 'heal') && inputs.run-heal == 'true' && inputs.heal-mode != 'off'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token != '' && inputs.github-token || github.token }}
        OPENAI_BASE_URL: ${{ inputs.openai-base-url }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        QUAIL_MODEL: ${{ inputs.model }}
        QUAIL_HEAL_MODE: ${{ inputs.heal-mode }}
        QUAIL_PR: ${{ inputs.pr }}
        QUAIL_PLAYWRIGHT_REPORT: ${{ inputs.playwright-report }}
        QUAIL_LOG_LEVEL: ${{ inputs.log-level }}
      run: |
        if [ "${{ inputs.heal-mode }}" = "on-failure" ] && [ ! -f "${{ inputs.playwright-report }}" ]; then
          echo "quail: no Playwright report at ${{ inputs.playwright-report }}; nothing to heal."
          exit 0
        fi
        quail heal
    - name: quail explore
      # Runs when explore-url is set. Ephemeral + change-aware by default:
      # generated specs land in a temp dir and are wiped on exit; the
      # Gherkin-formatted report streams to this step's stdout AND is
      # rendered as a spriteCloud-branded HTML page for artifact upload.
      id: quail-explore
      if: inputs.explore-url != ''
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token != '' && inputs.github-token || github.token }}
        OPENAI_BASE_URL: ${{ inputs.openai-base-url }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        QUAIL_MODEL: ${{ inputs.model }}
        QUAIL_LLM: ${{ inputs.explore-llm }}
        QUAIL_LOG_LEVEL: ${{ inputs.log-level }}
        QUAIL_LLM_TIMEOUT: ${{ inputs.llm-timeout }}
        QUAIL_BROWSERS: ${{ inputs.browsers }}
        QUAIL_PR: ${{ inputs.pr }}
      run: |
        set -euo pipefail
        export QUAIL_ENGINE="${QUAIL_BROWSERS%%,*}"
        gherkin="${RUNNER_TEMP}/explore-report.gherkin"
        html="${RUNNER_TEMP}/explore-report.html"
        quail explore \
          --url "${{ inputs.explore-url }}" \
          --focus "${{ inputs.explore-focus }}" \
          --depth "${{ inputs.explore-depth }}" \
          | tee "$gherkin"
        python3 "${{ github.action_path }}/scripts/render-explore-html.py" \
          "$gherkin" "$html" \
          --url "${{ inputs.explore-url }}" \
          --pr  "${{ inputs.pr }}" \
          --sha "${{ github.sha }}" \
          --generated "$(date -u +%FT%TZ)"
        echo "html-report=$html"     >> "$GITHUB_OUTPUT"
        echo "gherkin-report=$gherkin" >> "$GITHUB_OUTPUT"
    - name: Upload explore report
      if: inputs.explore-url != '' && steps.quail-explore.outputs.html-report != ''
      uses: actions/upload-artifact@v4
      with:
        name: quail-explore-report
        path: |
          ${{ steps.quail-explore.outputs.html-report }}
          ${{ steps.quail-explore.outputs.gherkin-report }}
        if-no-files-found: warn
    - name: quail review (@quail PR reviewer)
      # Pairs with an issue_comment workflow filtered on `@quail` in the
      # comment body. Fetches the PR diff, asks the LLM to summarise as
      # `## Core Changes` + `## Verdict`, and posts the result as a
      # single markdown comment.
      if: inputs.mode == 'review'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token != '' && inputs.github-token || github.token }}
        OPENAI_BASE_URL: ${{ inputs.openai-base-url }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        QUAIL_MODEL: ${{ inputs.model }}
        QUAIL_LLM_TIMEOUT: ${{ inputs.llm-timeout }}
        QUAIL_PR: ${{ inputs.pr }}
        QUAIL_LOG_LEVEL: ${{ inputs.log-level }}
      run: |
        quail review
    - name: Render branded Playwright HTML
      # Fires whenever the caller's `playwright-report` input points at
      # a file that exists on disk. That input already gates heal on
      # failure; reusing it means zero new inputs and any customer
      # workflow that runs Playwright automatically gets a
      # spriteCloud-branded HTML view of the run on the summary.
      id: playwright-html
      if: always()
      shell: bash
      env:
        PW_JSON: ${{ inputs.playwright-report }}
      run: |
        set -euo pipefail
        if [ -z "${PW_JSON}" ] || [ ! -f "${PW_JSON}" ]; then
          echo "quail-review: no Playwright JSON at '${PW_JSON:-<unset>}'; skipping branded HTML."
          exit 0
        fi
        out="${RUNNER_TEMP}/quail-playwright-report.html"
        python3 "${{ github.action_path }}/scripts/render-playwright-html.py" \
          "${PW_JSON}" "${out}" \
          --pr  "${{ inputs.pr }}" \
          --sha "${{ github.sha }}" \
          --generated "$(date -u +%FT%TZ)"
        echo "html=${out}"      >> "$GITHUB_OUTPUT"
        echo "json=${PW_JSON}"  >> "$GITHUB_OUTPUT"
    - name: Upload branded Playwright report
      if: always() && steps.playwright-html.outputs.html != ''
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-${{ inputs.pr }}
        path: |
          ${{ steps.playwright-html.outputs.html }}
          ${{ steps.playwright-html.outputs.json }}
        if-no-files-found: warn
        retention-days: 14
