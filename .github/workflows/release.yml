name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'    # only full semver tags; ignore floating v1 etc.

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # v1.8.1 — quail-core is a private repo in the same org. Without
      # this, `go test` and `go build` try to fetch the module via the
      # public proxy, fail, then fall back to unauthenticated git
      # ls-remote, fail again (exit 128). GITHUB_TOKEN has cross-repo
      # read access within the org.
      - name: Auth for private quail-core module
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
          echo "GOPRIVATE=github.com/spriteCloud" >> "$GITHUB_ENV"

      - name: Run tests
        run: go test ./...

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
