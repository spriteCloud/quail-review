name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'    # only full semver tags; ignore floating v1 etc.

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # v1.8.1 — quail-core is a private repo in the same org. Default
      # GITHUB_TOKEN is scoped to THIS repo only; use QUAIL_PAT which
      # has cross-repo read access. Without this, `go test` fails on
      # `git ls-remote` at quail-core (exit 128, unauthenticated).
      - name: Auth for private quail-core module
        env:
          GH_TOKEN: ${{ secrets.QUAIL_PAT }}
        run: |
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
          echo "GOPRIVATE=github.com/spriteCloud" >> "$GITHUB_ENV"

      - name: Run tests
        run: go test ./...

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
